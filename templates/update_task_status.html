{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-xl shadow-sm border border-slate-100">
    <h2 class="text-2xl font-semibold mb-6">Update Task Status</h2>
    <p class="mb-4 text-slate-600">Task: <span class="font-bold text-slate-900">{{ object.title }}</span></p>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label class="block text-sm font-medium mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}
        <div class="flex justify-end gap-2 mt-6">
            <a href="{% url 'dashboard' %}" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded">Cancel</a>
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Update</button>
        </div>
    </form>
</div>
<script>
    document.querySelectorAll('select').forEach(el => {
        el.classList.add('w-full', 'border', 'rounded-lg', 'p-2', 'focus:ring', 'focus:ring-blue-200');
    });
</script>
{% endblock %}
