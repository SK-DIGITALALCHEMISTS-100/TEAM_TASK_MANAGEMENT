{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-xl shadow-sm border border-slate-100 text-center">
    <h2 class="text-2xl font-semibold mb-4 text-red-600">Delete Task</h2>
    <p class="mb-6 text-slate-600">Are you sure you want to delete the task <br><span class="font-bold text-slate-900">"{{ task.title }}"</span>?</p>
    <form method="post">
        {% csrf_token %}
        <div class="flex justify-center gap-4">
            <a href="{% url 'dashboard' %}" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded">Cancel</a>
            <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Yes, Delete</button>
        </div>
    </form>
</div>
{% endblock %}
