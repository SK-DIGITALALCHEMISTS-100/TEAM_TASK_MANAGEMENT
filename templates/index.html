<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden-view { display: none; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="glass border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="text-2xl font-bold text-blue-600 tracking-tight">Team Task Manager</div>
        <div id="nav-actions">
            <!-- Dynamic Actions -->
        </div>
    </nav>

    <!-- Main Container -->
    <main class="flex-grow p-6 overflow-y-auto" id="app-container">
        
        <!-- Login / Register View -->
        <div id="auth-view" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-sm border border-slate-100 hidden-view">
            <h2 class="text-2xl font-semibold mb-6 text-center" id="auth-title">Login</h2>
            <form id="auth-form" class="space-y-4">
                <div id="register-fields" class="hidden">
                    <label class="block text-sm font-medium mb-1">Role</label>
                    <select id="role" class="w-full border rounded-lg p-2 focus:ring focus:ring-blue-200">
                        <option value="Member">Member</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Username</label>
                    <input type="text" id="username" class="w-full border rounded-lg p-2 focus:ring focus:ring-blue-200" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Password</label>
                    <input type="password" id="password" class="w-full border rounded-lg p-2 focus:ring focus:ring-blue-200" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-medium py-2 rounded-lg hover:bg-blue-700 transition">Submit</button>
            </form>
            <p class="mt-4 text-center text-sm text-slate-500">
                <a href="#" id="toggle-auth" class="text-blue-600 hover:underline">Need an account? Register</a>
            </p>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="max-w-6xl mx-auto hidden-view space-y-6">
            <div class="flex justify-between items-center">
                <h1 class="text-3xl font-bold">Dashboard</h1>
                <div class="text-sm bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-medium" id="user-role-badge"></div>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="stats-container">
                <!-- Stats injected here -->
            </div>

            <!-- Admin Controls -->
            <div id="admin-controls" class="hidden bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <h2 class="text-xl font-semibold mb-4">Admin Controls</h2>
                <div class="flex gap-4">
                    <button onclick="showModal('project-modal')" class="bg-slate-800 text-white px-4 py-2 rounded hover:bg-slate-700 transition">Create Project</button>
                    <button onclick="showModal('task-modal')" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">Create Task</button>
                </div>
            </div>

            <!-- Tasks List -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
                <h2 class="text-xl font-semibold mb-4">Your Tasks</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-200 text-slate-500 text-sm">
                                <th class="pb-3 font-medium">Title</th>
                                <th class="pb-3 font-medium">Project</th>
                                <th class="pb-3 font-medium">Assigned To</th>
                                <th class="pb-3 font-medium">Due Date</th>
                                <th class="pb-3 font-medium">Status</th>
                                <th class="pb-3 font-medium">Action</th>
                            </tr>
                        </thead>
                        <tbody id="tasks-table-body" class="text-sm">
                            <!-- Tasks injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <!-- Modals -->
    <div id="project-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden-view z-50">
        <div class="bg-white p-6 rounded-xl w-full max-w-md">
            <h2 class="text-xl font-bold mb-4">Create Project</h2>
            <form id="project-form" class="space-y-4">
                <input type="text" id="project-name" placeholder="Project Name" class="w-full border rounded p-2" required>
                <textarea id="project-desc" placeholder="Description" class="w-full border rounded p-2"></textarea>
                <div class="flex justify-end gap-2 mt-4">
                    <button type="button" onclick="hideModal('project-modal')" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded">Cancel</button>
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Create</button>
                </div>
            </form>
        </div>
    </div>

    <div id="task-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden-view z-50">
        <div class="bg-white p-6 rounded-xl w-full max-w-md">
            <h2 class="text-xl font-bold mb-4">Create Task</h2>
            <form id="task-form" class="space-y-4">
                <input type="text" id="task-title" placeholder="Task Title" class="w-full border rounded p-2" required>
                <textarea id="task-desc" placeholder="Description" class="w-full border rounded p-2"></textarea>
                <select id="task-project" class="w-full border rounded p-2" required><option value="">Select Project</option></select>
                <select id="task-assignee" class="w-full border rounded p-2" required><option value="">Assign To</option></select>
                <input type="date" id="task-due" class="w-full border rounded p-2" required>
                <div class="flex justify-end gap-2 mt-4">
                    <button type="button" onclick="hideModal('task-modal')" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded">Cancel</button>
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Create</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentUser = null;
        let isRegistering = false;

        // Utility: Fetch with Auth
        async function fetchWithAuth(url, options = {}) {
            const token = localStorage.getItem('access_token');
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            
            let res = await fetch(url, { ...options, headers });
            
            // Handle token expiration naively by logging out for now
            if (res.status === 401) {
                logout();
                throw new Error("Unauthorized");
            }
            return res;
        }

        // View Routing
        function showView(viewId) {
            document.querySelectorAll('#app-container > div').forEach(el => el.classList.add('hidden-view'));
            document.getElementById(viewId).classList.remove('hidden-view');
        }

        function showModal(modalId) { document.getElementById(modalId).classList.remove('hidden-view'); }
        function hideModal(modalId) { document.getElementById(modalId).classList.add('hidden-view'); }

        // Initialization
        async function init() {
            const token = localStorage.getItem('access_token');
            if (token) {
                try {
                    const res = await fetchWithAuth(`${API_BASE}/auth/me/`);
                    if (res.ok) {
                        currentUser = await res.json();
                        loadDashboard();
                        return;
                    }
                } catch (e) {}
            }
            showAuth();
        }

        // Authentication
        function showAuth() {
            currentUser = null;
            document.getElementById('nav-actions').innerHTML = '';
            showView('auth-view');
        }

        function logout() {
            localStorage.removeItem('access_token');
            showAuth();
        }

        document.getElementById('toggle-auth').addEventListener('click', (e) => {
            e.preventDefault();
            isRegistering = !isRegistering;
            document.getElementById('auth-title').innerText = isRegistering ? 'Register' : 'Login';
            document.getElementById('register-fields').classList.toggle('hidden', !isRegistering);
            e.target.innerText = isRegistering ? 'Already have an account? Login' : 'Need an account? Register';
        });

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                if (isRegistering) {
                    const role = document.getElementById('role').value;
                    const res = await fetch(`${API_BASE}/auth/register/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password, role })
                    });
                    if (!res.ok) throw new Error("Registration failed");
                }
                
                // Login
                const loginRes = await fetch(`${API_BASE}/auth/login/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                if (!loginRes.ok) throw new Error("Login failed");
                const data = await loginRes.json();
                localStorage.setItem('access_token', data.access);
                
                // Get user info
                const meRes = await fetchWithAuth(`${API_BASE}/auth/me/`);
                currentUser = await meRes.json();
                
                loadDashboard();
            } catch (err) {
                alert(err.message);
            }
        });

        // Dashboard
        async function loadDashboard() {
            showView('dashboard-view');
            document.getElementById('nav-actions').innerHTML = `
                <span class="mr-4 font-medium">${currentUser.username}</span>
                <button onclick="logout()" class="text-sm text-red-600 hover:underline">Logout</button>
            `;
            document.getElementById('user-role-badge').innerText = currentUser.role;

            if (currentUser.role === 'Admin') {
                document.getElementById('admin-controls').classList.remove('hidden');
                loadDropdowns();
            } else {
                document.getElementById('admin-controls').classList.add('hidden');
            }

            loadStats();
            loadTasks();
        }

        async function loadStats() {
            const res = await fetchWithAuth(`${API_BASE}/dashboard/`);
            if (res.ok) {
                const stats = await res.json();
                const colors = { total: 'bg-blue-50 text-blue-600 border-blue-100', pending: 'bg-amber-50 text-amber-600 border-amber-100', in_progress: 'bg-purple-50 text-purple-600 border-purple-100', completed: 'bg-emerald-50 text-emerald-600 border-emerald-100', overdue: 'bg-red-50 text-red-600 border-red-100' };
                let html = '';
                for (const [key, val] of Object.entries(stats)) {
                    const title = key.replace('_', ' ').toUpperCase();
                    html += `<div class="p-4 rounded-xl border ${colors[key] || 'bg-slate-50 border-slate-100'}">
                        <div class="text-xs font-bold mb-1 opacity-70">${title}</div>
                        <div class="text-3xl font-black">${val}</div>
                    </div>`;
                }
                document.getElementById('stats-container').innerHTML = html;
            }
        }

        const statusColors = {
            'Pending': 'bg-amber-100 text-amber-800',
            'In Progress': 'bg-purple-100 text-purple-800',
            'Completed': 'bg-emerald-100 text-emerald-800',
            'Overdue': 'bg-red-100 text-red-800'
        };

        async function loadTasks() {
            const res = await fetchWithAuth(`${API_BASE}/tasks/`);
            if (res.ok) {
                const tasks = await res.json();
                let html = '';
                tasks.forEach(t => {
                    html += `
                        <tr class="border-b border-slate-50 hover:bg-slate-50 transition">
                            <td class="py-3 font-medium">${t.title}</td>
                            <td class="py-3 text-slate-500">${t.project_name}</td>
                            <td class="py-3 text-slate-500">${t.assigned_to_name || 'Unassigned'}</td>
                            <td class="py-3 text-slate-500">${t.due_date}</td>
                            <td class="py-3">
                                <select onchange="updateTaskStatus(${t.id}, this.value)" class="text-xs px-2 py-1 rounded-full font-medium ${statusColors[t.status] || ''} border-0 cursor-pointer outline-none ring-0">
                                    <option value="Pending" ${t.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                    <option value="In Progress" ${t.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
                                    <option value="Completed" ${t.status === 'Completed' ? 'selected' : ''}>Completed</option>
                                    <option value="Overdue" ${t.status === 'Overdue' ? 'selected' : ''}>Overdue</option>
                                </select>
                            </td>
                            <td class="py-3">
                                ${currentUser.role === 'Admin' ? `<button onclick="deleteTask(${t.id})" class="text-red-500 hover:text-red-700 text-xs">Delete</button>` : '-'}
                            </td>
                        </tr>
                    `;
                });
                document.getElementById('tasks-table-body').innerHTML = html;
            }
        }

        async function updateTaskStatus(taskId, status) {
            await fetchWithAuth(`${API_BASE}/tasks/${taskId}/`, {
                method: 'PATCH',
                body: JSON.stringify({ status })
            });
            loadStats();
            loadTasks();
        }

        async function deleteTask(taskId) {
            if(confirm('Are you sure?')) {
                await fetchWithAuth(`${API_BASE}/tasks/${taskId}/`, { method: 'DELETE' });
                loadStats();
                loadTasks();
            }
        }

        // Admin Modals
        async function loadDropdowns() {
            const pRes = await fetchWithAuth(`${API_BASE}/projects/`);
            if (pRes.ok) {
                const projects = await pRes.json();
                document.getElementById('task-project').innerHTML = '<option value="">Select Project</option>' + projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            }
            const uRes = await fetchWithAuth(`${API_BASE}/users/`);
            if (uRes.ok) {
                const users = await uRes.json();
                document.getElementById('task-assignee').innerHTML = '<option value="">Assign To</option>' + users.map(u => `<option value="${u.id}">${u.username} (${u.role})</option>`).join('');
            }
        }

        document.getElementById('project-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await fetchWithAuth(`${API_BASE}/projects/`, {
                method: 'POST',
                body: JSON.stringify({
                    name: document.getElementById('project-name').value,
                    description: document.getElementById('project-desc').value
                })
            });
            hideModal('project-modal');
            e.target.reset();
            loadDropdowns();
        });

        document.getElementById('task-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await fetchWithAuth(`${API_BASE}/tasks/`, {
                method: 'POST',
                body: JSON.stringify({
                    title: document.getElementById('task-title').value,
                    description: document.getElementById('task-desc').value,
                    project: document.getElementById('task-project').value,
                    assigned_to: document.getElementById('task-assignee').value,
                    due_date: document.getElementById('task-due').value
                })
            });
            hideModal('task-modal');
            e.target.reset();
            loadStats();
            loadTasks();
        });

        init();
    </script>
</body>
</html>
