{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-sm border border-slate-100">
    <h2 class="text-2xl font-semibold mb-6 text-center">Register</h2>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label class="block text-sm font-medium mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
            {% endif %}
            {% if field.help_text %}
                <p class="text-slate-400 text-xs mt-1">{{ field.help_text|safe }}</p>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="w-full bg-blue-600 text-white font-medium py-2 rounded-lg hover:bg-blue-700 transition">Register</button>
    </form>
    <p class="mt-4 text-center text-sm text-slate-500">
        <a href="{% url 'login' %}" class="text-blue-600 hover:underline">Already have an account? Login</a>
    </p>
</div>

<script>
    // Style default django form inputs
    document.querySelectorAll('input, select').forEach(el => {
        if(el.type !== 'checkbox') {
            el.classList.add('w-full', 'border', 'rounded-lg', 'p-2', 'focus:ring', 'focus:ring-blue-200');
        }
    });
</script>
{% endblock %}
